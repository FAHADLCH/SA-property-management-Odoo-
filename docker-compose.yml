services:
  db:
    image: postgres:15
    container_name: sa_pm_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - sa_pm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:18
    container_name: sa_pm_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling / live chat
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - sa_pm_odoo_data:/var/lib/odoo
      - ./sa_property_management:/mnt/extra-addons/sa_property_management:ro
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    command: >
      odoo
      -c /etc/odoo/odoo.conf
      -d sa_demo
      -i sa_property_management

volumes:
  sa_pm_pgdata:
  sa_pm_odoo_data:
