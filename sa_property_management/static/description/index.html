<!--
    The Odoo Apps Store sanitizes description HTML (it strips <style> blocks,
    external CSS and web fonts) and only honors Bootstrap 4 classes plus a
    small whitelist of inline style attributes. To guarantee the branded design
    renders on the live store, each section ships as an optimized image in this
    same /static/description folder and is embedded with Bootstrap's responsive
    .img-fluid class. No JavaScript, external CSS or non-whitelisted links.
-->
<section class="oe_screenshots container text-center">
    <img class="img-fluid d-block mx-auto" src="sec_hero.jpg" alt="SA Property Management by SA Systems — real estate ERP for any country. Manage housing schemes, plots, apartments, payment plans, dealerships and property transfers with a country-aware tax engine built in. 6 core modules, 7+ country tax presets, Odoo 18 and 19, 100% configurable, free and open source, with a live booking and payment-plan dashboard."/>
    <img class="img-fluid d-block mx-auto" src="sec_features.jpg" alt="Core features: property and inventory management, flexible payment plans, booking and invoicing through Odoo Accounting, receivables and aging tracking, dealership commission management and configurable property transfers."/>
    <img class="img-fluid d-block mx-auto" src="sec_architecture.jpg" alt="Country-aware tax engine — define transfer taxes such as stamp duty, registration, capital gains, withholding, transfer tax, land department fees and miscellaneous charges per country, then pick your operating country in configuration. Ready-made presets ship for Pakistan, India, the US, the UK, the UAE, Saudi Arabia and Australia. Built natively on Odoo's Accounting, CRM, Discuss, Portal, Products and Contacts modules and deploys on Odoo.sh and on-premise."/>
    <img class="img-fluid d-block mx-auto" src="sec_reports.jpg" alt="Professional documents and reports: booking confirmation, installment payment schedule and a tax-itemized property transfer deed."/>
    <img class="img-fluid d-block mx-auto" src="sec_footer.jpg" alt="SA Property Management by SA Systems for Odoo 18 and 19. Free and open source, licensed under LGPL-3, and deployable on Odoo.sh and on-premise."/>
