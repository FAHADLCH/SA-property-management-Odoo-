<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="bbg" cx="82%" cy="-6%" r="120%">
      <stop offset="0%" stop-color="#5a1418"/>
      <stop offset="34%" stop-color="#23090c"/>
      <stop offset="74%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#080809"/>
    </radialGradient>
    <linearGradient id="bred" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4a3c"/>
      <stop offset="100%" stop-color="#ad1e22"/>
    </linearGradient>
    <linearGradient id="btower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1d22"/>
      <stop offset="100%" stop-color="#160d10"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bbg)"/>
  <g stroke="#ff3c3c" stroke-width="1" opacity="0.05">
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- brand -->
  <g transform="translate(72,64)">
    <polygon points="22,0 42,11 42,33 22,44 2,33 2,11" fill="url(#bred)"/>
    <polygon points="22,9 34,16 34,28 22,35 10,28 10,16" fill="#0d0d0f"/>
    <polygon points="22,14 29,18 29,26 22,30 15,26 15,18" fill="#ff6b60"/>
    <text x="58" y="19" fill="#ffffff" font-size="22" font-weight="bold" letter-spacing="0.6">SA Systems</text>
    <text x="58" y="38" fill="#d4a5a9" font-size="12" letter-spacing="2.6">PROPERTY + CONSTRUCTION INTELLIGENCE</text>
  </g>

  <!-- badge -->
  <g transform="translate(72,150)">
    <rect x="0" y="0" width="430" height="36" rx="18" fill="url(#bred)"/>
    <text x="22" y="24" fill="#ffffff" font-size="14" font-weight="bold" letter-spacing="2.4">REAL ESTATE + CONSTRUCTION ERP &#183; GLOBAL READY</text>
  </g>

  <!-- headline -->
  <g transform="translate(70,232)">
    <text x="0" y="48" font-size="74" font-weight="bold" letter-spacing="-2">
      <tspan fill="#ffffff">SA </tspan><tspan fill="#ff3c3c">Property</tspan>
    </text>
    <text x="0" y="126" font-size="74" font-weight="bold" letter-spacing="-2" fill="#ffffff">Management</text>
    <text x="2" y="178" font-size="22" fill="#d4d4d8">Sell plots and deliver projects in <tspan fill="#ff7a6b" font-weight="bold">one</tspan> Odoo app —</text>
    <text x="2" y="210" font-size="22" fill="#d4d4d8">payment plans, country-aware taxes, subcontracts, IPCs &amp; procurement.</text>
  </g>

  <!-- feature chips -->
  <g transform="translate(72,486)" font-size="14.5" font-weight="bold" fill="#ffd9d4">
    <rect x="0"   y="0" width="168" height="40" rx="20" fill="none" stroke="#5a2a2e" stroke-width="1.4"/><text x="22"  y="26">Payment Plans</text>
    <rect x="184" y="0" width="206" height="40" rx="20" fill="none" stroke="#5a2a2e" stroke-width="1.4"/><text x="206" y="26">Country-Aware Tax</text>
    <rect x="406" y="0" width="216" height="40" rx="20" fill="none" stroke="#5a2a2e" stroke-width="1.4"/><text x="428" y="26">Subcontracts &amp; IPCs</text>
    <rect x="638" y="0" width="168" height="40" rx="20" fill="none" stroke="#5a2a2e" stroke-width="1.4"/><text x="660" y="26">Procurement</text>
    <rect x="822" y="0" width="196" height="40" rx="20" fill="none" stroke="#5a2a2e" stroke-width="1.4"/><text x="844" y="26">Transfers &amp; QR</text>
  </g>

