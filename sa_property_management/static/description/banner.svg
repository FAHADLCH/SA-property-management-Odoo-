      <rect x="36" y="134" width="16" height="16"/><rect x="62" y="134" width="16" height="16"/><rect x="88" y="134" width="16" height="16"/>
      <rect x="36" y="164" width="16" height="16"/><rect x="62" y="164" width="16" height="16"/><rect x="88" y="164" width="16" height="16"/>
      <rect x="36" y="194" width="16" height="16"/><rect x="62" y="194" width="16" height="16"/><rect x="88" y="194" width="16" height="16"/>
      <rect x="36" y="224" width="16" height="16"/><rect x="62" y="224" width="16" height="16"/><rect x="88" y="224" width="16" height="16"/>
      <rect x="36" y="254" width="16" height="16"/><rect x="62" y="254" width="16" height="16"/><rect x="88" y="254" width="16" height="16"/>
    </g>

    <rect x="146" y="150" width="78" height="150" fill="url(#btower)" stroke="#6e3035" stroke-width="2"/>
    <g fill="#ffae9f" opacity="0.8">
      <rect x="160" y="166" width="14" height="14"/><rect x="184" y="166" width="14" height="14"/><rect x="206" y="166" width="14" height="14"/>
      <rect x="160" y="192" width="14" height="14"/><rect x="184" y="192" width="14" height="14"/><rect x="206" y="192" width="14" height="14"/>
      <rect x="160" y="218" width="14" height="14"/><rect x="184" y="218" width="14" height="14"/><rect x="206" y="218" width="14" height="14"/>
      <rect x="160" y="244" width="14" height="14"/><rect x="184" y="244" width="14" height="14"/><rect x="206" y="244" width="14" height="14"/>
    </g>

    <rect x="242" y="196" width="74" height="104" fill="none" stroke="#8a4147" stroke-width="2.5"/>
    <line x1="242" y1="230" x2="316" y2="230" stroke="#8a4147" stroke-width="2"/>
    <line x1="242" y1="264" x2="316" y2="264" stroke="#8a4147" stroke-width="2"/>
    <line x1="279" y1="196" x2="279" y2="300" stroke="#8a4147" stroke-width="2"/>

    <g stroke="#ff3c3c" stroke-width="4" fill="none" stroke-linecap="round">
      <line x1="300" y1="300" x2="300" y2="64"/>
      <line x1="300" y1="64" x2="170" y2="64"/>
      <line x1="300" y1="64" x2="332" y2="64"/>
      <line x1="300" y1="64" x2="196" y2="96"/>
      <line x1="300" y1="64" x2="322" y2="96"/>
    </g>
    <line x1="210" y1="64" x2="210" y2="128" stroke="#ff7a6b" stroke-width="3"/>
    <rect x="196" y="128" width="28" height="20" fill="url(#bred)"/>
    <circle cx="300" cy="64" r="7" fill="#ffffff"/>
  </g>

  <!-- footer strip -->
  <text x="600" y="576" fill="#8a8a92" font-size="13" text-anchor="middle" letter-spacing="0.5">Odoo 18 &amp; 19  &#183;  LGPL-3  &#183;  49 automated tests  &#183;  info@sasystems.solutions</text>
